name: vulcan-curl
version: 0.1.5
debug: false
help:
  main:
    description: Help agents choose structured GET/POST entries or supported curl-style argv for one API/debug HTTP request, not webpage scraping or HTML-to-Markdown fetching.
    file: help/help.md
  topics:
    - name: get
      description: Simple API/debug GET request workflow.
      file: help/get.md
    - name: post
      description: Simple API/debug POST and multipart request workflow.
      file: help/post.md
    - name: request
      description: Supported curl-style argv workflow for advanced API/debug HTTP requests.
      file: help/request.md
entries:
  - name: get
    description: "Execute one simple GET request for API debugging, webhook checks, or file downloads with url, params, headers, and timeout only. This tool returns raw HTTP response content and does not convert webpages to Markdown; use a browser-oriented tool for webpage fetching or rendered page inspection."
    lua_entry: runtime/vulcan-curl-get.lua
    lua_module: vulcan_curl_get
    help: get
    input_schema_file: schemas/get.input.schema.json
  - name: post
    description: "Execute one simple POST request for API debugging, webhook testing, or multipart upload checks with url, headers, and one body mode: json, form, or raw body. This tool returns raw HTTP response content and does not convert webpages to Markdown; use a browser-oriented tool for webpage fetching or rendered page inspection."
    lua_entry: runtime/vulcan-curl-post.lua
    lua_module: vulcan_curl_post
    help: post
    input_schema_file: schemas/post.input.schema.json
  - name: request
    description: "Execute one advanced API/debug HTTP request through lua-curl using a runtime-parsed subset of Linux curl-style argv semantics without depending on platform-specific shell syntax, including supported target TLS and HTTPS proxy TLS flags. This tool is not intended for webpage scraping, JS-rendered page fetching, or HTML-to-Markdown conversion."
    lua_entry: runtime/vulcan-curl.lua
    lua_module: vulcan_curl
    help: request
    input_schema_file: schemas/request.input.schema.json
